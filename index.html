<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAYA · 靈魂印記</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  background:#040d2e;
  font-family:'Noto Serif TC',serif;
  display:flex;align-items:flex-start;justify-content:center;
  padding:40px 20px 60px;
  overflow-x:hidden;
  position:relative;
}

canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* 河流 */
.river{
  position:fixed;bottom:0;left:0;width:100%;height:40%;
  z-index:1;pointer-events:none;overflow:hidden;
}
.river svg{width:100%;height:100%;}

.aura{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.overlay{position:fixed;inset:0;z-index:0;background:
      linear-gradient(180deg,
        rgba(0,5,20,0.35) 0%,
        rgba(0,5,20,0.42) 18%,
        rgba(0,8,28,0.58) 45%,
        rgba(0,5,18,0.75) 70%,
        rgba(0,3,12,0.88) 100%
      );pointer-events:none;}
.a1{width:450px;height:450px;background:rgba(180,130,40,0.08);top:-80px;left:-120px;animation:af 18s ease-in-out infinite;}
.a2{width:350px;height:350px;background:rgba(100,80,20,0.08);bottom:-60px;right:-80px;animation:af 13s ease-in-out infinite reverse;}
@keyframes af{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}

.brand{
  position:fixed;bottom:14px;right:16px;z-index:200;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;
  color:rgba(220,185,110,0.28);pointer-events:none;user-select:none;
}

.wrap{
  position:relative;z-index:10;
  width:100%;max-width:480px;
}

/* ══ 封頁 ══ */
#intro{text-align:center;padding:60px 0 20px;}

.seed-wrap{
  margin:0 auto 36px;
  width:180px;height:180px;
  animation:slowSpin 30s linear infinite;
  filter:drop-shadow(0 0 30px rgba(255,220,120,0.5)) drop-shadow(0 0 60px rgba(220,180,80,0.25));
}
@keyframes slowSpin{to{transform:rotate(360deg);}}

.naya-name{
  font-family:'Cinzel Decorative',serif;
  font-size:38px;font-weight:700;
  letter-spacing:12px;
  text-shadow:0 0 30px rgba(220,180,80,0.4),0 0 60px rgba(180,140,40,0.2);
  background:linear-gradient(135deg,#f0d060 0%,#fff8e0 40%,#e8d090 70%,#c8a840 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gsh 6s ease infinite;
  margin-bottom:10px;
}
@keyframes gsh{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.naya-tagline{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:6px;
  color:rgba(220,185,110,0.4);
  margin-bottom:48px;
}

.divider{
  display:flex;align-items:center;gap:16px;
  margin:0 auto 40px;width:260px;
}
.divider hr{flex:1;border:none;border-top:1px solid rgba(220,185,110,0.2);}
.divider span{font-size:14px;color:rgba(220,185,110,0.4);}

.intro-desc{
  font-size:16px;line-height:2.4;
  color:rgba(248,242,225,0.95);text-shadow:0 0 12px rgba(200,170,80,0.15);
  margin-bottom:48px;
  letter-spacing:0.5px;
}
.intro-desc em{color:#e8b4d0;font-style:normal;}

.start-btn{
  background:transparent;
  border:1px solid rgba(220,185,110,0.4);
  border-radius:2px;
  padding:18px 52px;
  color:rgba(220,185,110,0.8);
  font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:6px;
  cursor:pointer;
  transition:all 0.3s;
  display:inline-block;
}
.start-btn:hover{
  border-color:rgba(220,185,110,0.7);
  color:#e8c87a;
  box-shadow:0 0 30px rgba(220,185,110,0.12);
}

/* ══ 測驗頁 ══ */
#quiz{display:none;}

/* 進度 */
.prog{
  display:flex;gap:8px;justify-content:center;
  margin-bottom:44px;
}
.prog-dot{
  width:8px;height:8px;border-radius:50%;
  border:1px solid rgba(220,185,110,0.25);
  background:transparent;
  transition:all 0.4s;
}
.prog-dot.done{background:rgba(220,185,110,0.7);border-color:rgba(220,185,110,0.7);}
.prog-dot.now{background:rgba(220,185,110,0.25);border-color:rgba(220,185,110,0.5);}

/* 水晶球區塊 — 圖在上，文字在下，完全分開 */
.ball-block{
  margin:0 auto 40px;
  text-align:center;
}

.ball-svg-wrap{display:none;}

.q-number{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:5px;
  color:rgba(220,185,110,0.35);
  margin-bottom:18px;
}

.q-icon{
  font-size:36px;
  display:block;
  margin-bottom:18px;
  animation:iconBob 3s ease-in-out infinite;
}
@keyframes iconBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

.q-main{
  font-family:'Noto Serif TC',serif;
  font-size:22px;font-weight:600;
  color:rgba(255,250,235,1);text-shadow:0 0 8px rgba(220,185,80,0.2);
  line-height:1.7;
  margin-bottom:12px;
  white-space:pre-line;
}

.q-hint{
  font-size:13px;
  color:rgba(220,200,255,0.7);
  font-style:italic;
  letter-spacing:0.5px;
}

/* 四元素選項 — 橫式、大字、有空間 */
.elems{
  display:flex;flex-direction:column;
  gap:12px;
}

.elem-row{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(200,160,240,0.12);
  border-radius:12px;
  cursor:pointer;
  transition:all 0.25s;
  overflow:hidden;
  min-height:64px;
}
.elem-row:hover,.elem-row.sel{
  background:rgba(200,150,255,0.07);
}

.elem-badge{
  width:64px;flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:14px 8px;
  border-right:1px solid rgba(200,160,240,0.1);
  gap:4px;
}
.elem-sym{font-size:22px;line-height:1;}
.elem-label{display:none;}

.elem-text{
  flex:1;
  padding:14px 18px;
  font-size:15px;
  color:rgba(255,250,235,1);text-shadow:0 0 8px rgba(220,185,80,0.2);
  line-height:1.6;
  letter-spacing:0.3px;
}

/* 元素顏色 */
.e-earth .elem-badge{border-right-color:rgba(120,200,80,0.15);}
.e-earth:hover,.e-earth.sel{border-color:rgba(120,200,80,0.3);background:rgba(120,200,80,0.05);}
.e-earth .elem-sym{filter:drop-shadow(0 0 6px rgba(120,200,80,0.6));}
.e-earth .elem-label{color:rgba(160,230,100,0.6);}

.e-water .elem-badge{border-right-color:rgba(80,160,240,0.15);}
.e-water:hover,.e-water.sel{border-color:rgba(80,160,240,0.3);background:rgba(80,160,240,0.05);}
.e-water .elem-sym{filter:drop-shadow(0 0 6px rgba(80,160,240,0.6));}
.e-water .elem-label{color:rgba(100,190,255,0.6);}

.e-fire .elem-badge{border-right-color:rgba(240,120,60,0.15);}
.e-fire:hover,.e-fire.sel{border-color:rgba(240,120,60,0.3);background:rgba(240,120,60,0.05);}
.e-fire .elem-sym{filter:drop-shadow(0 0 6px rgba(240,120,60,0.6));}
.e-fire .elem-label{color:rgba(255,150,80,0.6);}

.e-wind .elem-badge{border-right-color:rgba(200,180,255,0.15);}
.e-wind:hover,.e-wind.sel{border-color:rgba(200,180,255,0.3);background:rgba(200,180,255,0.05);}
.e-wind .elem-sym{filter:drop-shadow(0 0 6px rgba(200,180,255,0.6));}
.e-wind .elem-label{color:rgba(220,200,255,0.6);}

/* ══ 結果頁 ══ */
#result{display:none;text-align:center;}

.result-icon{
  font-size:64px;
  display:block;
  margin-bottom:16px;
  animation:rGlow 3s ease-in-out infinite;
}
@keyframes rGlow{
  0%,100%{filter:drop-shadow(0 0 10px rgba(220,185,110,0.4));}
  50%{filter:drop-shadow(0 0 28px rgba(220,185,110,0.7));}
}

.r-label{
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:5px;
  color:rgba(220,185,110,0.35);
  margin-bottom:12px;
  text-transform:uppercase;
}
.r-type{
  font-family:'Cinzel Decorative',serif;
  font-size:22px;color:rgba(255,252,255,1);text-shadow:0 0 20px rgba(200,170,80,0.3);
  margin-bottom:6px;line-height:1.4;
}
.r-en{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;
  color:rgba(220,185,110,0.35);margin-bottom:36px;
}

.r-divider{
  display:flex;align-items:center;gap:14px;
  margin:0 auto 32px;
}
.r-divider hr{flex:1;border:none;border-top:1px solid rgba(220,185,110,0.12);}
.r-divider span{color:rgba(240,210,120,0.7);font-size:13px;}

.r-block{
  text-align:left;
  margin-bottom:28px;
  padding:0 4px;
}
.r-block-title{
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:4px;
  color:rgba(220,185,110,0.4);
  margin-bottom:14px;
  text-transform:uppercase;
}
.r-block-text{
  font-size:16px;
  line-height:2.4;
  color:rgba(255,252,240,1);text-shadow:0 0 10px rgba(200,170,80,0.25);
  letter-spacing:0.3px;
}
.r-block-text em{color:#f0c0d8;font-style:normal;}

.r-tags{
  display:flex;flex-wrap:wrap;gap:8px;
  justify-content:center;
  margin-bottom:40px;
}
.r-tag{
  border:1px solid rgba(220,185,110,0.6);
  border-radius:2px;
  padding:7px 16px;
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:2px;
  color:rgba(240,210,120,0.95);
}

.share-block{
  margin-bottom:36px;
}
.share-txt{
  font-size:13px;font-style:italic;
  color:rgba(230,215,255,0.85);
  letter-spacing:1px;margin-bottom:8px;
}
.share-acct{
  font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:4px;
  color:rgba(240,210,120,0.9);
}

.retry{
  background:transparent;
  border:1px solid rgba(200,160,240,0.2);
  border-radius:2px;
  padding:14px 36px;
  color:rgba(200,160,240,0.4);
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:4px;
  cursor:pointer;transition:all 0.25s;
}
.retry:hover{border-color:rgba(200,160,240,0.45);color:rgba(200,160,240,0.65);}
</style>
</head>

  <div class="naya-name">NAYA</div>
  <div class="naya-tagline">SOUL IMPRINT · 靈魂印記</div>

  <div class="divider"><hr><span>✦</span><hr></div>

  <div class="intro-desc">
    你這一生，帶著什麼印記來的？<br><br>
    地、水、火、風<br>
    四種元素住在每個靈魂裡<br>
    只是<em>比例不同</em><br><br>
    5個問題，找到你的靈魂本質
  </div>

  <button class="start-btn" onclick="start()">✦ &nbsp;叩問靈魂&nbsp; ✦</button>
</div>

<!-- ══ 測驗 ══ -->
<div id="quiz">
  <div class="prog" id="prog"></div>

  <div class="ball-block">
    <!-- 月亮佔位空間：背景月亮約在畫面上半部，用margin-top撐開 -->
    <div style="height:140px;"></div>
    <!-- 題目文字，月亮正下方 -->
    <div class="q-number" id="qNum">I · V</div>
    <div class="q-main" id="qMain"></div>
    <div class="q-hint" id="qHint"></div>
  </div>

  <!-- 橫式四元素選項 -->
  <div class="elems" id="elems"></div>
</div>

<!-- ══ 結果 ══ -->
<div id="result">
  <span class="result-icon" id="rEmoji"></span>
  <div class="r-label">NAYA · 你的靈魂印記</div>
  <div class="r-type" id="rType"></div>
  <div class="r-en" id="rEn"></div>

  <div class="r-divider"><hr><span>✦</span><hr></div>

  <div class="r-block">
    <div class="r-block-title">✦ &nbsp;靈魂本質</div>
    <div class="r-block-text" id="rNature"></div>
  </div>

  <div class="r-divider"><hr><span>·</span><hr></div>

  <div class="r-block">
    <div class="r-block-title">✦ &nbsp;你不知道的自己</div>
    <div class="r-block-text" id="rShadow"></div>
  </div>

  <div class="r-divider"><hr><span>·</span><hr></div>

  <div class="r-block">
    <div class="r-block-title">✦ &nbsp;此生課題</div>
    <div class="r-block-text" id="rLesson"></div>
  </div>

  <div class="r-tags" id="rTags"></div>

  <div class="share-block">
    <div class="share-txt">── 截圖，傳給你最想看透的那個人 ──</div>
    <div class="share-acct">@ginaholictw</div>
  </div>
  <button class="retry" onclick="reset()">↺ &nbsp;重新叩問</button>
</div>

</div>

<script>
// 星空 + 流星
const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
let S=[],meteors=[];
function resize(){cv.width=innerWidth;cv.height=innerHeight;mkS();}
function mkS(){
  S=[];
  for(let i=0;i<160;i++)S.push({
    x:Math.random()*cv.width,
    y:Math.random()*cv.height*0.55,
    r:Math.random()*1.4+0.2,
    sp:0.003+Math.random()*0.01,
    ph:Math.random()*Math.PI*2
  });
}
function spawnMeteor(){
  if(Math.random()<0.003){
    meteors.push({
      x:Math.random()*cv.width,y:0,
      len:80+Math.random()*60,
      speed:8+Math.random()*6,
      angle:Math.PI/4+Math.random()*0.3,
      life:1,alpha:0.8
    });
  }
}
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  const t=Date.now()*0.001;
  // 星星
  S.forEach(s=>{
    const a=0.2+0.6*Math.sin(t*s.sp*10+s.ph);
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(220,230,255,${a})`;cx.fill();
  });
  // 月光倒影品牌文字（在畫面下方海面位置浮動）
  const riverY = cv.height * 0.78;
  const waveOffset = Math.sin(t * 0.4) * 6;
  cx.save();
  cx.font = "italic 11px 'Georgia', serif";
  const textAlpha = 0.18 + 0.07 * Math.sin(t * 0.6);
  cx.fillStyle = `rgba(220,185,110,${textAlpha})`;
  cx.textAlign = "center";
  const brand = "@ginaholictw";
  const totalW = brand.length * 9;
  const startX = cv.width / 2 - totalW / 2;
  for(let i = 0; i < brand.length; i++){
    const charX = startX + i * 9;
    const charY = riverY + Math.sin(t * 1.2 + i * 0.5) * 3 + waveOffset * 0.5;
    cx.fillText(brand[i], charX, charY);
  }
  cx.restore();

  // 流星
  spawnMeteor();
  meteors=meteors.filter(m=>m.life>0);
  meteors.forEach(m=>{
    cx.save();
    const grad=cx.createLinearGradient(m.x,m.y,m.x-Math.cos(m.angle)*m.len,m.y-Math.sin(m.angle)*m.len);
    grad.addColorStop(0,`rgba(255,248,220,${m.alpha})`);
    grad.addColorStop(1,'rgba(255,248,220,0)');
    cx.strokeStyle=grad;cx.lineWidth=1.5;
    cx.beginPath();
    cx.moveTo(m.x,m.y);
    cx.lineTo(m.x-Math.cos(m.angle)*m.len,m.y-Math.sin(m.angle)*m.len);
    cx.stroke();cx.restore();
    m.x+=Math.cos(m.angle)*m.speed;
    m.y+=Math.sin(m.angle)*m.speed;
    m.life-=0.025;m.alpha=m.life*0.8;
  });
  requestAnimationFrame(draw);
}
window.addEventListener('resize',resize);resize();draw();

const ELEMS=[
  {key:'earth',sym:'🜃',label:'地'},
  {key:'water',sym:'🜄',label:'水'},
  {key:'fire', sym:'🜂',label:'火'},
  {key:'wind', sym:'🜁',label:'風'},
];
const ROMANS=['I','II','III','IV','V'];

const qs=[
  {
    icon:'🌊',
    text:'你最常在什麼時候\n突然感到孤獨？',
    hint:'不是沒人陪，是更深的那種',
    opts:[
      {el:'earth',text:'明明在人群裡，卻突然覺得格格不入'},
      {el:'water',text:'有人說「我懂你」，但你知道他不懂'},
      {el:'fire', text:'做到一半，突然不知道在為誰努力'},
      {el:'wind', text:'話說一半，然後算了'},
    ]
  },
  {
    icon:'🪞',
    text:'別人說你很好\n但你心裡清楚自己其實是——',
    hint:'說真的，不用演',
    opts:[
      {el:'earth',text:'比外表更容易受傷的人'},
      {el:'water',text:'一直在扮演「還好」的那個人'},
      {el:'fire', text:'對自己要求比任何人都嚴的人'},
      {el:'wind', text:'還在等一個人真正看見你的人'},
    ]
  },
  {
    icon:'🫀',
    text:'你最難原諒的\n其實是誰？',
    hint:'第一個浮現的，就是答案',
    opts:[
      {el:'earth',text:'讓你以為被理解、後來才知道沒有的人'},
      {el:'water',text:'自己——為什麼當時沒保護好自己'},
      {el:'fire', text:'拿走你信任卻不珍惜的人'},
      {el:'wind', text:'說不上來，就是一種說不清的遺憾'},
    ]
  },
  {
    icon:'💌',
    text:'你的愛\n是什麼形狀的？',
    hint:'你給出去的方式，洩露了你的靈魂',
    opts:[
      {el:'earth',text:'很深，但不說——你以為對方感覺得到'},
      {el:'water',text:'很小心——因為你知道愛可以傷人'},
      {el:'fire', text:'全部給出去，悄悄希望有一點回來'},
      {el:'wind', text:'忽遠忽近——太近了你會怕'},
    ]
  },
  {
    icon:'✨',
    text:'深夜睡不著\n你腦袋裡在播什麼？',
    hint:'那些沒說出口的，都在這裡',
    opts:[
      {el:'earth',text:'某句話——反覆重播，停不下來'},
      {el:'water',text:'那個選擇——如果當時不一樣'},
      {el:'fire', text:'對未來的焦慮——還差多遠才夠'},
      {el:'wind', text:'某個人的臉——不一定是現在的人'},
    ]
  }
];

const results={
  earth:{emoji:'🌿',type:'大地印記靈魂',en:'EARTH IMPRINT',
    nature:'你的靈魂是<em>穩定的力量</em>。你不輕易說出口，但你的存在本身就讓身邊的人感到踏實。你看清楚很多事，只是你選擇了沉默——不是你不知道，是你知道了更多。',
    shadow:'你最深的秘密是：<em>你比任何人都需要被接住</em>。你一直是那個接住別人的人，但那個想被人好好托著的你，幾乎沒有人看見過。',
    lesson:'這一生你要學的，是<em>讓自己也有需要的樣子</em>。堅強不是你的全部，柔軟才是你最深的勇氣。',
    tags:['穩定的力量','不輕易說出口','默默承擔','渴望被接住','看清但選擇沉默']},
  water:{emoji:'🌊',type:'深水印記靈魂',en:'WATER IMPRINT',
    nature:'你的靈魂<em>流動，也承載</em>。你感受得到別人說的和真正想的之間的縫隙，也常常在這縫隙裡為別人難過。這是你的天賦，也是你最累的地方。',
    shadow:'你最不想承認的是：<em>你對自己有多苛刻</em>。你原諒別人很快，原諒自己很慢。那些說「我放下了」的時刻，其實還沒有。',
    lesson:'這一生你要學的，是<em>允許自己也是需要被愛的人</em>。你不只是一條河，你也值得有個地方可以停下來。',
    tags:['高度共感','流動承載','對自己嚴苛','感知縫隙','原諒別人快過自己']},
  fire:{emoji:'🔥',type:'烈焰印記靈魂',en:'FIRE IMPRINT',
    nature:'你的靈魂是<em>給出去的那種</em>。你愛的時候很用力，燃燒起來的時候連自己都覺得燙。這是你最美的部分，也是你最容易耗盡自己的地方。',
    shadow:'你最深的恐懼是：<em>這一切付出，最後換來的是空的</em>。你不說，但每次給出去的時候，心裡有一塊在等一個同等重量的回應。',
    lesson:'這一生你要學的，是<em>先替自己燃燒</em>。你不需要靠點亮別人來確認自己發光，你本來就是光。',
    tags:['給予型靈魂','愛得深烈','容易耗盡','渴望被同等回應','天生的光']},
  wind:{emoji:'🌙',type:'潮汐印記靈魂',en:'WIND IMPRINT',
    nature:'你的靈魂<em>有自己的節律</em>。你不是善變，是你感受到的東西太多——每一次靠近和後退，都是在保護那個最柔軟的地方。',
    shadow:'你心裡住著一個還沒真正結束的感情或遺憾。<em>不一定是現在的</em>，但它還在。你沒有忘記，你只是學會了不去想它。',
    lesson:'這一生你要學的，是<em>允許自己真正靠岸</em>。風可以遠行，但也需要有一塊陸地停下來。你值得有一個不需要再退的地方。',
    tags:['忽近忽遠','保護柔軟','感受豐沛','有些事還沒放下','渴望靠岸']},
};

let cur=0,scores={earth:0,water:0,fire:0,wind:0};

function start(){
  document.getElementById('intro').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQ();
}

function renderProg(){
  const p=document.getElementById('prog');
  p.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='prog-dot'+(i<cur?' done':i===cur?' now':'');
    p.appendChild(d);
  }
}

function renderQ(){
  renderProg();
  const q=qs[cur];
  document.getElementById('qNum').textContent=ROMANS[cur]+' · V';
  document.getElementById('qMain').textContent=q.text;
  document.getElementById('qHint').textContent=q.hint;

  const el=document.getElementById('elems');
  el.innerHTML='';
  q.opts.forEach(o=>{
    const meta=ELEMS.find(e=>e.key===o.el);
    const div=document.createElement('div');
    div.className=`elem-row e-${o.el}`;
    div.innerHTML=`
      <div class="elem-badge">
        <span class="elem-sym">${meta.sym}</span>
        <span class="elem-label">${meta.label}</span>
      </div>
      <div class="elem-text">${o.text}</div>
    `;
    div.onclick=()=>pick(o.el,div);
    el.appendChild(div);
  });
}

function pick(type,div){
  document.querySelectorAll('.elem-row').forEach(e=>e.classList.remove('sel'));
  div.classList.add('sel');
  scores[type]++;
  setTimeout(()=>{cur++;cur<5?renderQ():showResult();},520);
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const r=results[top];
  document.getElementById('rEmoji').textContent=r.emoji;
  document.getElementById('rType').textContent=r.type;
  document.getElementById('rEn').textContent=r.en;
  document.getElementById('rNature').innerHTML=r.nature;
  document.getElementById('rShadow').innerHTML=r.shadow;
  document.getElementById('rLesson').innerHTML=r.lesson;
  document.getElementById('rTags').innerHTML=r.tags.map(t=>`<span class="r-tag">${t}</span>`).join('');
  document.getElementById('result').style.display='block';
}

function reset(){
  cur=0;scores={earth:0,water:0,fire:0,wind:0};
  document.getElementById('result').style.display='none';
  document.getElementById('intro').style.display='block';
}
</script>
</body>
</html>
